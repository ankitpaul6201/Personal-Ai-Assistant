name: CI & Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linting & Testing Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Verify Python Syntax Across Modules
        run: |
          python -m py_compile main.py setup.py ui.py core/exceptions.py core/security.py core/logger.py memory/config_manager.py memory/memory_manager.py

      - name: Run Ruff Code Quality Scan
        run: |
          ruff check core/ memory/ tests/ --exit-zero

      - name: Run Unit & Security Test Suite
        run: |
          python -m unittest discover tests
